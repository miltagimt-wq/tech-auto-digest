name: Tech Auto Daily Digest

on:
  schedule:
    - cron: '0 3 * * *'  # ogni giorno alle 03:00 UTC = 05:00 ora di Roma (CET) / 08:00 CEST
  workflow_dispatch:      # permette di lanciarlo manualmente da GitHub

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser groq resend pytz

      - name: Run digest script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python daily_digest.py
